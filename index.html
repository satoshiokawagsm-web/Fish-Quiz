<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>沖縄の魚クイズ</title>

<style>
body {
    text-align: center;
    font-family: sans-serif;
    background-color: #e0f7fa;
    margin: 0;
    padding: 20px;
}
h1 { color: #00796b; }

button {
    padding: 10px 15px;
    margin: 5px;
    font-size: 16px;
    border-radius: 10px;
    border: none;
    background: #00796b;
    color: white;
}

img {
    width: 100%;
    max-width: 400px;
    border-radius: 15px;
}

.choice {
    display: block;
    margin: 10px auto;
    width: 80%;
    background: white;
    color: black;
    border: 2px solid #00796b;
}

.hidden { display: none; }
</style>
</head>

<body>

<h1>沖縄の魚クイズ🐟</h1>

<!-- モード選択 -->
<div id="menu">
    <button onclick="startNormal()">タップクイズ</button>
    <button onclick="startQuiz()">4択クイズ</button>
    <button onclick="showZukan()">図鑑</button>
</div>

<!-- タップクイズ -->
<div id="normal" class="hidden">
    <img id="img-normal">
    <div id="name-normal"></div>
</div>

<!-- 4択 -->
<div id="quiz" class="hidden">
    <img id="img-quiz">
    <div id="choices"></div>
</div>

<!-- 図鑑 -->
<div id="zukan" class="hidden"></div>

<script>
const fishList = [
{ name:"クマノミ", image:"fish1.jpg"},
{ name:"ハリセンボン", image:"fish2.jpg"},
{ name:"ナンヨウハギ", image:"fish3.jpg"},
{ name:"ハタタテハゼ", image:"fish4.jpg"},
{ name:"ツノダシ", image:"fish5.jpg"},
{ name:"ミナミハコフグ", image:"fish6.jpg"},
{ name:"デバスズメダイ", image:"fish7.jpg"},
{ name:"ロクセンスズメダイ", image:"fish8.jpg"}
];

// 🔊 音
const correctSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3");
const wrongSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3");

let current;
let showName = false;

// ------------------
// タップクイズ
// ------------------
function startNormal(){
    hideAll();
    document.getElementById("normal").classList.remove("hidden");
    nextNormal();
}

function nextNormal(){
    current = fishList[Math.floor(Math.random()*fishList.length)];
    document.getElementById("img-normal").src = current.image;
    document.getElementById("name-normal").innerText = "";
    showName = false;
}

document.getElementById("normal").onclick = () => {
    if(!showName){
        document.getElementById("name-normal").innerText = current.name;
        correctSound.play();
        showName = true;
    }else{
        nextNormal();
    }
};

// ------------------
// 4択クイズ
// ------------------
function startQuiz(){
    hideAll();
    document.getElementById("quiz").classList.remove("hidden");
    nextQuiz();
}

function nextQuiz(){
    const choices = shuffle([...fishList]).slice(0,4);
    current = choices[Math.floor(Math.random()*4)];

    document.getElementById("img-quiz").src = current.image;

    const container = document.getElementById("choices");
    container.innerHTML = "";

    choices.forEach(c=>{
        const btn = document.createElement("button");
        btn.innerText = c.name;
        btn.className = "choice";

        btn.onclick = ()=>{
            if(c.name === current.name){
                correctSound.play();
                alert("正解！");
            }else{
                wrongSound.play();
                alert("不正解！");
            }
            nextQuiz();
        };

        container.appendChild(btn);
    });
}

// ------------------
// 図鑑
// ------------------
function showZukan(){
    hideAll();
    const z = document.getElementById("zukan");
    z.classList.remove("hidden");
    z.innerHTML = "";

    fishList.forEach(f=>{
        const div = document.createElement("div");
        div.innerHTML = `
            <img src="${f.image}">
            <p>${f.name}</p>
        `;
        z.appendChild(div);
    });
}

// ------------------
function hideAll(){
    document.getElementById("normal").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("zukan").classList.add("hidden");
}

// シャッフル
function shuffle(arr){
    return arr.sort(()=>Math.random()-0.5);
}
</script>

</body>
</html>
